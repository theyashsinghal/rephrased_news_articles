name: Run News AI Rephraser

on:
  repository_dispatch:
    types: [trigger-rephraser] # Listens for the Scraper's trigger signal
  workflow_dispatch:          # Manual trigger

concurrency:
  group: news-rephraser
  cancel-in-progress: false

jobs:
  process_articles:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Cache HuggingFace Models
        uses: actions/cache@v4
        with:
          path: ./models
          key: ${{ runner.os }}-gemma-2-2b-q6-v3 # Aligned to the Gemma 2 filename
          restore-keys: |
            ${{ runner.os }}-gemma-2-2b-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install huggingface_hub
          export CMAKE_ARGS="-DLLAMA_AVX=OFF -DLLAMA_AVX2=OFF -DLLAMA_FMA=OFF"
          pip install --no-cache-dir "llama-cpp-python>=0.2.90"
          # Check if requirements.txt exists before installing
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          else
            pip install gspread oauth2client
          fi

      - name: Download Gemma Model
        run: |
          mkdir -p models
          if [ ! -f "./models/gemma-2-2b-it-Q6_K_L.gguf" ]; then
            echo "Downloading Gemma 2 2B model from HuggingFace..."
            huggingface-cli download bartowski/gemma-2-2b-it-GGUF gemma-2-2b-it-Q6_K_L.gguf --local-dir ./models --local-dir-use-symlinks False
          else
            echo "Gemma 2 2B model loaded from cache."
          fi

      - name: Run Rephraser Pipeline
        env:
          GCP_SERVICE_ACCOUNT_JSON: ${{ secrets.GCP_SERVICE_ACCOUNT_JSON }}
        run: |
          python rephrase_news_AI.py

      - name: Trigger Classifier Workflow
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.TRIGGER_CLASSIFIER_TOKEN }}
          repository: OWNER_OF_CLASSIFIER/CLASSIFIER_REPO_NAME # <--- Replace with classifier account/repo path (e.g., theyashsinghal/classifier)
          event-type: trigger-classifier
          client-payload: '{"ref": "${{ github.ref }}", "sha": "${{ github.sha }}"}'
